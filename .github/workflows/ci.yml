name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: PostgreSQL E2E via Testcontainers
        run: npm run test:e2e
      - name: Install Chromium for UI E2E
        run: npx playwright install --with-deps chromium
      - name: Browser UI E2E
        run: npm run test:e2e:web
      - run: npm run build
